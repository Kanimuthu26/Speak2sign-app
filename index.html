        function App() {
            const [currentScreen, setCurrentScreen] = useState('auth');
            const [isListening, setIsListening] = useState(false);
            const [transcript, setTranscript] = useState('');
            const [signSequence, setSignSequence] = useState([]);
            const [currentSignIndex, setCurrentSignIndex] = useState(0);
            const [detectedGesture, setDetectedGesture] = useState('');
            const [isCameraActive, setIsCameraActive] = useState(false);

            const recognitionRef = useRef(null);
            const videoRef = useRef(null);
            const handsRef = useRef(null);
            const lastGestureRef = useRef('');
            const gestureTimeoutRef = useRef(null);

            // Initialize Speech Recognition
            useEffect(() => {
                if ('webkitSpeechRecognition' in window) {
                    const recognition = new webkitSpeechRecognition();
                    recognition.continuous = true;
                    recognition.interimResults = true;
                    recognition.lang = 'en-US';

                    recognition.onresult = (event) => {
                        let finalTranscript = '';
                        for (let i = event.resultIndex; i < event.results.length; i++) {
                            if (event.results[i].isFinal) {
                                finalTranscript += event.results[i][0].transcript;
                            }
                        }
                        if (finalTranscript) {
                            setTranscript(prev => (prev + ' ' + finalTranscript).trim());
                        }
                    };

                    recognition.onerror = (event) => {
                        console.error('Speech recognition error:', event.error);
                    };

                    recognitionRef.current = recognition;
                }
            }, []);

            // Start listening
            const startListening = () => {
                setTranscript('');
                setIsListening(true);
                if (recognitionRef.current) {
                    recognitionRef.current.start();
                }
            };

            // Stop listening
            const stopListening = () => {
                setIsListening(false);
                if (recognitionRef.current) {
                    recognitionRef.current.stop();
                }
            };

            // Convert text to sign sequence - FIXED VERSION
            const convertToSigns = () => {
                // Split by spaces and filter empty strings
                const words = transcript.trim().split(/\s+/).filter(w => w.length > 0);
                
                const signs = words.map(word => {
                    // Convert to lowercase and remove punctuation
                    const cleanWord = word.toLowerCase().replace(/[^\w]/g, '');
                    return {
                        word: cleanWord,
                        sign: signMap[cleanWord] || '❓'
                    };
                });
                
                setSignSequence(signs);
                setCurrentSignIndex(0);
            };

            // Display signs one by one
            useEffect(() => {
                if (signSequence.length > 0 && currentScreen === 'video-output') {
                    const interval = setInterval(() => {
                        setCurrentSignIndex(prev => {
                            if (prev < signSequence.length - 1) {
                                return prev + 1;
                            } else {
                                clearInterval(interval);
                                return prev;
                            }
                        });
                    }, 1500);
                    return () => clearInterval(interval);
                }
            }, [signSequence, currentScreen]);

            // Initialize MediaPipe Hands for gesture recognition
            const initializeCamera = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { width: 1280, height: 720 } 
                    });
                    if (videoRef.current) {
                        videoRef.current.srcObject = stream;
                        setIsCameraActive(true);
                        
                        // Initialize MediaPipe Hands
                        const hands = new Hands({
                            locateFile: (file) => {
                                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
                            }
                        });

                        hands.setOptions({
                            maxNumHands: 1,
                            modelComplexity: 1,
                            minDetectionConfidence: 0.7,
                            minTrackingConfidence: 0.7
                        });

                        hands.onResults(onHandsResults);
                        handsRef.current = hands;

                        // Start processing
                        const camera = new Camera(videoRef.current, {
                            onFrame: async () => {
                                await hands.send({ image: videoRef.current });
                            },
                            width: 1280,
                            height: 720
                        });
                        camera.start();
                    }
                } catch (error) {
                    console.error('Error accessing camera:', error);
                    alert('Could not access camera. Please check permissions.');
                }
            };

            // Process hand landmarks
            const onHandsResults = (results) => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const landmarks = results.multiHandLandmarks[0];
                    const handedness = results.multiHandedness[0].label;
                    const gesture = classifyGesture(landmarks, handedness);
                    
                    if (gesture && gesture !== lastGestureRef.current) {
                        lastGestureRef.current = gesture;
                        setDetectedGesture(gesture);
                        speakText(gesture);
                        
                        // Clear previous timeout
                        if (gestureTimeoutRef.current) {
                            clearTimeout(gestureTimeoutRef.current);
                        }
                        
                        // Reset gesture after 2 seconds
                        gestureTimeoutRef.current = setTimeout(() => {
                            lastGestureRef.current = '';
                        }, 2000);
                    }
                }
            };

            // IMPROVED gesture classification
            const classifyGesture = (landmarks, handedness) => {
                // Finger tip and base indices
                const thumbTip = 4, thumbBase = 2;
                const indexTip = 8, indexBase = 6;
                const middleTip = 12, middleBase = 10;
                const ringTip = 16, ringBase = 14;
                const pinkyTip = 20, pinkyBase = 18;

                // Helper function to check if finger is extended
                const isFingerExtended = (tipIdx, baseIdx) => {
                    return landmarks[tipIdx].y < landmarks[baseIdx].y;
                };

                // Check thumb extension (different for left/right hand)
                const isThumbExtended = handedness === 'Right' 
                    ? landmarks[thumbTip].x < landmarks[thumbBase].x 
                    : landmarks[thumbTip].x > landmarks[thumbBase].x;

                // Count extended fingers
                const indexExtended = isFingerExtended(indexTip, indexBase);
                const middleExtended = isFingerExtended(middleTip, middleBase);
                const ringExtended = isFingerExtended(ringTip, ringBase);
                const pinkyExtended = isFingerExtended(pinkyTip, pinkyBase);

                const extendedFingers = [indexExtended, middleExtended, ringExtended, pinkyExtended].filter(Boolean).length;

                // GESTURE CLASSIFICATION

                // HELLO - All 5 fingers extended
                if (isThumbExtended && extendedFingers === 4) {
                    return 'Hello';
                }

                // STOP - Closed fist (no fingers extended)
                if (!isThumbExtended && extendedFingers === 0) {
                    return 'Stop';
                }

                // YES - Only index finger extended
                if (indexExtended && !middleExtended && !ringExtended && !pinkyExtended) {
                    return 'Yes';
                }

                // NO - All fingers except thumb extended
                if (!isThumbExtended && extendedFingers === 4) {
                    return 'No';
                }

                // GOOD - Only thumb extended (thumbs up)
                if (isThumbExtended && extendedFingers === 0) {
                    return 'Good';
                }

                // PLEASE - Open palm moving (simplified as open palm)
                if (extendedFingers >= 3 && isThumbExtended) {
                    return 'Please';
                }

                // THANK YOU - Similar to please
                if (extendedFingers === 3 && isThumbExtended) {
                    return 'Thank You';
                }

                // I LOVE YOU - Index, middle, and pinky extended, thumb extended
                if (indexExtended && !middleExtended && !ringExtended && pinkyExtended && isThumbExtended) {
                    return 'I Love You';
                }

                // OK - Index and thumb forming circle
                const thumbIndexDistance = Math.sqrt(
                    Math.pow(landmarks[thumbTip].x - landmarks[indexTip].x, 2) +
                    Math.pow(landmarks[thumbTip].y - landmarks[indexTip].y, 2)
                );
                
                if (thumbIndexDistance < 0.05 && middleExtended && ringExtended && pinkyExtended) {
                    return 'OK';
                }

                return null;
            };

            // Text to speech
            const speakText = (text) => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.rate = 0.9;
                    utterance.pitch = 1;
                    utterance.volume = 1;
                    window.speechSynthesis.speak(utterance);
                }
            };

            // Stop camera
            const stopCamera = () => {
                if (videoRef.current && videoRef.current.srcObject) {
                    const tracks = videoRef.current.srcObject.getTracks();
                    tracks.forEach(track => track.stop());
                    setIsCameraActive(false);
                    setDetectedGesture('');
                    lastGestureRef.current = '';
                }
            };

            // Screen navigation
            const goToScreen = (screen) => {
                stopListening();
                stopCamera();
                setCurrentScreen(screen);
            };

            // Render screens
            const renderScreen = () => {
                switch(currentScreen) {
                    case 'auth':
                        return <AuthScreen goToScreen={goToScreen} />;
                    case 'welcome':
                        return <WelcomeScreen goToScreen={goToScreen} />;
                    case 'listening':
                        return (
                            <ListeningScreen 
                                goToScreen={goToScreen}
                                isListening={isListening}
                                transcript={transcript}
                                startListening={startListening}
                                stopListening={stopListening}
                                convertToSigns={convertToSigns}
                            />
                        );
                    case 'text-output':
                        return (
                            <TextOutputScreen 
                                goToScreen={goToScreen}
                                transcript={transcript}
                            />
                        );
                    case 'video-output':
                        return (
                            <VideoOutputScreen 
                                goToScreen={goToScreen}
                                signSequence={signSequence}
                                currentSignIndex={currentSignIndex}
                            />
                        );
                    case 'video-input':
                        return (
                            <VideoInputScreen 
                                goToScreen={goToScreen}
                                videoRef={videoRef}
                                isCameraActive={isCameraActive}
                                detectedGesture={detectedGesture}
                                initializeCamera={initializeCamera}
                                stopCamera={stopCamera}
                            />
                        );
                    case 'about':
                        return <AboutScreen goToScreen={goToScreen} />;
                    default:
                        return <AuthScreen goToScreen={goToScreen} />;
                }
            };

            return <div>{renderScreen()}</div>;
        }

        // AUTH SCREEN
        function AuthScreen({ goToScreen }) {
            return (
                <div className="screen">
                    <div className="auth-container">
                        <div className="left-panel">
                            <div className="form-box">
                                <h2>Create an account</h2>
                                <div className="input-field">
                                    <input type="email" placeholder="Enter an email id" />
                                </div>
                                <div className="input-field">
                                    <input type="password" placeholder="New Password" />
                                </div>
                                <button className="primary-btn" onClick={() => goToScreen('welcome')}>
                                    SIGN UP
                                </button>
                                <div className="divider">
                                    <span>or</span>
                                </div>
                                <button className="secondary-btn" onClick={() => goToScreen('welcome')}>
                                    Sign in with Google
                                </button>
                                <div className="link-text">
                                    <p>Already have an account? <a href="#" onClick={() => goToScreen('welcome')}>Log in</a></p>
                                </div>
                            </div>
                        </div>
                        <div className="right-panel">
                            <div className="intro-image">🤝</div>
                            <div className="tagline">
                                <h2>SIGNSYNC</h2>
                                <h3>WHY DON'T US?!</h3>
                                <p>Breaking Barriers,</p>
                                <p>One Sign at a Time</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // WELCOME SCREEN
        function WelcomeScreen({ goToScreen }) {
            return (
                <div className="screen">
                    <div className="welcome-container">
                        <div className="welcome-header">
                            <h1>WELCOME !!</h1>
                            <div className="welcome-emoji">👋</div>
                            <p className="welcome-subtitle">Explore about us!!</p>
                        </div>
                        <div className="question-box">
                            <p>What do you want to do today?</p>
                        </div>
                        <div className="options-grid">
                            <div className="feature-card" onClick={() => {
                                goToScreen('listening');
                            }}>
                                <div className="icon">📝</div>
                                <h3>Speech to Text</h3>
                            </div>
                            <div className="feature-card" onClick={() => {
                                goToScreen('listening');
                            }}>
                                <div className="icon">🎬</div>
                                <h3>Speech to Video</h3>
                            </div>
                            <div className="feature-card" onClick={() => {
                                goToScreen('video-input');
                            }}>
                                <div className="icon">🎤</div>
                                <h3>Video to Speech</h3>
                            </div>
                        </div>
                        <button className="about-btn" onClick={() => goToScreen('about')}>
                            ABOUT US
                        </button>
                    </div>
                </div>
            );
        }

        // LISTENING SCREEN
        function ListeningScreen({ goToScreen, isListening, transcript, startListening, stopListening, convertToSigns }) {
            useEffect(() => {
                if (!isListening) {
                    startListening();
                }
                return () => stopListening();
            }, []);

            return (
                <div className="screen">
                    <button className="back-btn" onClick={() => goToScreen('welcome')}>←</button>
                    <div className="listening-container">
                        <h2>Listening{isListening && <span className="processing-dots"></span>}</h2>
                        <div className="mic-visual">🎤</div>
                        <div className="status-message">
                            {transcript || 'Ready to listen... Start speaking!'}
                        </div>
                        <div className="action-buttons">
                            <button className="action-btn" onClick={() => {
                                stopListening();
                                goToScreen('text-output');
                            }}>
                                To Text
                            </button>
                            <button className="action-btn" onClick={() => {
                                stopListening();
                                convertToSigns();
                                goToScreen('video-output');
                            }}>
                                To Video
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // TEXT OUTPUT SCREEN
        function TextOutputScreen({ goToScreen, transcript }) {
            const copyToClipboard = () => {
                navigator.clipboard.writeText(transcript);
                alert('Text copied to clipboard!');
            };

            return (
                <div className="screen">
                    <button className="back-btn" onClick={() => goToScreen('listening')}>←</button>
                    <div className="output-container">
                        <h2>Generated Text</h2>
                        <div className="text-output-box">
                            {transcript || 'No text recorded yet.'}
                        </div>
                        <div className="controls-row">
                            <button className="action-btn" onClick={copyToClipboard}>
                                Copy Text
                            </button>
                            <button className="action-btn" onClick={() => goToScreen('listening')}>
                                New Recording
                            </button>
                            <button className="action-btn" onClick={() => goToScreen('welcome')}>
                                Home
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // VIDEO OUTPUT SCREEN
        function VideoOutputScreen({ goToScreen, signSequence, currentSignIndex }) {
            const currentSign = signSequence[currentSignIndex];

            return (
                <div className="screen">
                    <button className="back-btn" onClick={() => goToScreen('listening')}>←</button>
                    <div className="output-container">
                        <h2>Sign Language Translation</h2>
                        <div className="video-display">
                            {signSequence.length > 0 ? (
                                <div className="sign-cards-container">
                                    <div className="sign-card">
                                        {currentSign?.sign}
                                    </div>
                                </div>
                            ) : (
                                <div className="sign-cards-container">
                                    <p style={{color: 'white'}}>No signs to display</p>
                                </div>
                            )}
                        </div>
                        {currentSign && (
                            <div className="sign-word">
                                Word: {currentSign.word}
                            </div>
                        )}
                        <div className="status-message">
                            Showing sign {currentSignIndex + 1} of {signSequence.length}
                        </div>
                        <div className="controls-row">
                            <button className="action-btn" onClick={() => goToScreen('listening')}>
                                New Translation
                            </button>
                            <button className="action-btn" onClick={() => goToScreen('welcome')}>
                                Home
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // VIDEO INPUT SCREEN
        function VideoInputScreen({ goToScreen, videoRef, isCameraActive, detectedGesture, initializeCamera, stopCamera }) {
            return (
                <div className="screen">
                    <button className="back-btn" onClick={() => goToScreen('welcome')}>←</button>
                    <div className="output-container">
                        <h2>Capture Sign Language</h2>
                        <div className="camera-feed">
                            <video ref={videoRef} autoPlay muted />
                            {detectedGesture && (
                                <div className="gesture-overlay">
                                    Detected: {detectedGesture}
                                </div>
                            )}
                        </div>
                        <div className="status-message">
                            {isCameraActive ? 'Camera active - Show hand gestures' : 'Camera not started'}
                        </div>
                        <div className="controls-row">
                            {!isCameraActive ? (
                                <button className="action-btn" onClick={initializeCamera}>
                                    Start Camera
                                </button>
                            ) : (
                                <button className="action-btn" onClick={stopCamera}>
                                    Stop Camera
                                </button>
                            )}
                            <button className="action-btn" onClick={() => goToScreen('welcome')}>
                                Home
                            </button>
                        </div>
                        <div className="status-message">
                            <strong>Supported Gestures:</strong><br/>
                            ✋ All 5 fingers open = Hello<br/>
                            ✊ Closed fist = Stop<br/>
                            ☝️ Index finger up = Yes<br/>
                            🤚 Four fingers (no thumb) = No<br/>
                            👍 Thumb up = Good<br/>
                            🙏 Open palm = Please<br/>
                            👌 Thumb and index circle = OK<br/>
                            🤟 Index, pinky, and thumb = I Love You
                        </div>
                    </div>
                </div>
            );
        }

        // ABOUT SCREEN
        function AboutScreen({ goToScreen }) {
            const team = [
                { name: 'KANIMUTHU', role: 'TEAM LEAD', emoji: '👩‍💼' },
                { name: 'SANJAY', role: 'FRONTEND DEVELOPER', emoji: '👨‍💻' },
                { name: 'RAMYA', role: 'FRONTEND DEVELOPER', emoji: '👩‍💻' },
                { name: 'VARUN', role: 'LLM TRAINER', emoji: '👨‍🔬' }
            ];

            return (
                <div className="screen">
                    <button className="back-btn" onClick={() => goToScreen('welcome')}>←</button>
                    <div className="about-container">
                        <div className="about-header">
                            <h1>ABOUT US</h1>
                        </div>
                        <div className="team-grid">
                            {team.map((member, index) => (
                                <div key={index} className="team-card">
                                    <div className="member-avatar">{member.emoji}</div>
                                    <h3>{member.name}</h3>
                                    <p>{member.role}</p>
                                </div>
                            ))}
                        </div>
                        <div className="tech-visual">🚀</div>
                    </div>
                </div>
            );
        }

        // Render app
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
